services:
  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: db_despacho
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: supersecure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - network-innovatech

  backend:
    image: 410397845770.dkr.ecr.us-east-1.amazonaws.com/innovatech-backend-repo:latest
    container_name: innovatech-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/db_despacho
      SPRING_DATASOURCE_USERNAME: user_admin
      SPRING_DATASOURCE_PASSWORD: supersecure_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - db
    networks:
      - network-innovatech

  frontend:
    image: 410397845770.dkr.ecr.us-east-1.amazonaws.com/innovatech-frontend-repo:latest
    container_name: innovatech-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - network-innovatech

volumes:
  postgres_data:  # <-- AQUÍ ESTÁ LA CORRECCIÓN CLAVE

networks:
  network-innovatech:
    driver: bridge